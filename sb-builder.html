<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Storyboard Builder</title>
<style>
/* ═══ Notion 스킨 (StyleSeed) × Apple HIG 레이아웃 ═══
   - SF Pro 시스템 폰트 스택 · iOS 타입 스케일 (body 17px / large-title 34px)
   - 시스템 컬러 + 시맨틱 레이블 · 라이트/다크 모드
   - 8pt 그리드 · 카드 radius 16 · 인풋 radius 12 · 버튼 캡슐 · 44pt 터치 타깃
   - 표준 이징/듀레이션 · press scale(0.97) · reduced-motion 대응 */
:root{
  --font-system:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',Helvetica,Arial,sans-serif;
  /* StyleSeed · Notion skin */
  --blue:#0075de; --green:#2a9d99; --red:#dd5b00; --orange:#dd5b00;
  --gray3:#c4c0bb; --gray4:#c4c0bb; --gray5:#e8e5e1; --gray6:#f6f5f4;
  --label:rgba(0,0,0,.95); --label-2:#615d59; --label-3:#a39e98;
  --bg:#ffffff; --bg-card:#ffffff; --separator:rgba(0,0,0,.1);
  --primary:#37352f; --primary-hover:#4a4843; --primary-fg:#ffffff;
  --blue-tint:#f2f9ff; --focus-ring:rgba(9,127,232,.35);
  --shadow-card:rgba(0,0,0,.04) 0 4px 18px, rgba(0,0,0,.027) 0 2px 7.85px, rgba(0,0,0,.02) 0 .8px 2.93px;
  --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(0,0,.2,1);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme=light]){
    --blue:#529cca; --green:#4dab9a; --red:#d9730d; --orange:#d9730d;
    --gray3:#5a5a5a; --gray4:#4a4a4a; --gray5:#333333; --gray6:#2a2a2a;
    --label:rgba(255,255,255,.92); --label-2:rgba(255,255,255,.55); --label-3:rgba(255,255,255,.32);
    --bg:#191919; --bg-card:#202020; --separator:rgba(255,255,255,.12);
    --primary:#4a4843; --primary-hover:#5a5750; --primary-fg:rgba(255,255,255,.95);
    --blue-tint:rgba(35,131,226,.15); --focus-ring:rgba(35,131,226,.4);
    --shadow-card:rgba(0,0,0,.3) 0 4px 18px;
  }
}
:root[data-theme=dark]{
    --blue:#529cca; --green:#4dab9a; --red:#d9730d; --orange:#d9730d;
    --gray3:#5a5a5a; --gray4:#4a4a4a; --gray5:#333333; --gray6:#2a2a2a;
    --label:rgba(255,255,255,.92); --label-2:rgba(255,255,255,.55); --label-3:rgba(255,255,255,.32);
    --bg:#191919; --bg-card:#202020; --separator:rgba(255,255,255,.12);
    --primary:#4a4843; --primary-hover:#5a5750; --primary-fg:rgba(255,255,255,.95);
    --blue-tint:rgba(35,131,226,.15); --focus-ring:rgba(35,131,226,.4);
    --shadow-card:rgba(0,0,0,.3) 0 4px 18px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--label);font-family:var(--font-system);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 96px}

/* ─ Large Title 내비게이션 ─ */
header{padding:8px 4px 20px}
h1{margin:0;font-size:30px;font-weight:700;letter-spacing:-.3px}
.sub{color:var(--label-2);font-size:15px;margin-top:4px}

/* ─ 카드 (Grouped 스타일) ─ */
.card{background:var(--bg-card);border:1px solid var(--separator);border-radius:8px;
  padding:20px;margin-bottom:24px;box-shadow:var(--shadow-card)}
.section-title{font-size:13px;font-weight:600;color:var(--label-2);text-transform:uppercase;
  letter-spacing:.5px;margin:0 20px 8px;padding-top:8px}

/* ─ 폼 ─ */
label{display:block;font-size:13px;font-weight:600;color:var(--label-2);margin:16px 0 6px}
label:first-child{margin-top:0}
input[type=text],textarea{width:100%;min-height:40px;border:1px solid transparent;border-radius:6px;
  padding:9px 12px;font-size:15px;font-family:inherit;background:var(--gray6);color:var(--label);
  transition:box-shadow .2s var(--ease)}
input:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--focus-ring)}
textarea{min-height:140px;resize:vertical;line-height:1.5}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:200px}
::placeholder{color:var(--label-3)}

/* ─ 토글 (iOS 스위치) ─ */
.switch-row{display:flex;align-items:center;justify-content:space-between;min-height:44px;margin-top:16px}
.switch-row .lbl{font-size:17px;color:var(--label)}
.switch-row .hint{font-size:13px;color:var(--label-2);margin-top:1px}
.switch{position:relative;width:51px;height:31px;flex:none}
.switch input{opacity:0;width:0;height:0}
.knob{position:absolute;inset:0;background:var(--gray5);border-radius:9999px;cursor:pointer;
  transition:background .3s var(--ease)}
.knob:before{content:"";position:absolute;width:27px;height:27px;left:2px;top:2px;background:#fff;
  border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.15),0 1px 1px rgba(0,0,0,.16);
  transition:transform .3s var(--ease)}
.switch input:checked + .knob{background:var(--primary)}
.switch input:checked + .knob:before{transform:translateX(20px)}

/* ─ 버튼 (캡슐, 44pt) ─ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;
  padding:0 18px;border:none;border-radius:6px;font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;background:var(--primary);color:var(--primary-fg);
  transition:transform .1s var(--ease-out),opacity .2s var(--ease)}
.btn:hover{background:var(--primary-hover)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:default}
.btn.secondary{background:var(--bg-card);color:var(--label);border:1px solid var(--separator);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.btn.sm{min-height:30px;padding:0 12px;font-size:13.5px}
.btn.block{width:100%;margin-top:20px}
a.btn{text-decoration:none}

/* ─ 상태 배너 ─ */
.status{margin-top:16px;padding:11px 14px;border-radius:6px;background:var(--blue-tint);
  color:var(--blue);font-size:15px;font-weight:500;display:none;align-items:center;gap:8px}
.status.err{background:rgba(221,91,0,.1);color:var(--red)}
.status.ok{background:rgba(42,157,153,.12);color:var(--green)}
.spinner{width:16px;height:16px;flex:none;border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─ 프로젝트 리스트 (iOS Grouped List) ─ */
.list{background:var(--bg-card);border:1px solid var(--separator);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-card)}
.proj{padding:16px 20px}
.proj + .proj{border-top:.5px solid var(--separator)}
.pt{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pt b{font-size:17px;font-weight:600;letter-spacing:-.2px}
.meta{color:var(--label-2);font-size:13px;margin-top:2px}
.chip{display:inline-block;background:var(--gray6);border-radius:4px;padding:2px 8px;
  font-size:12px;font-weight:600;color:var(--label-2);margin-left:6px;vertical-align:1px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.hist{display:none;margin-top:14px;background:var(--gray6);border-radius:6px;padding:4px 0;overflow:hidden}
.hist-row{display:flex;gap:12px;padding:10px 16px;font-size:14px}
.hist-row + .hist-row{border-top:.5px solid var(--separator)}
.hist-date{flex:none;width:86px;color:var(--label-2);font-variant-numeric:tabular-nums}
.hist-items{flex:1;color:var(--label)}
.hist-items div{padding:1px 0}
.hist-drafter{flex:none;color:var(--label-3);font-size:13px}
.rev{display:none;margin-top:12px;gap:8px}
.rev.open{display:flex}
.rev input{flex:1}
.empty{color:var(--label-2);text-align:center;padding:44px 20px;font-size:15px}
.empty .sf{font-size:34px;display:block;margin-bottom:8px;opacity:.4}


/* ─ 업로드 ─ */
.up-hint{font-size:14px;color:var(--label-2);margin-bottom:14px}
.drop{display:flex;align-items:center;justify-content:center;min-height:76px;padding:16px;
  border:1.5px dashed var(--gray3);border-radius:8px;cursor:pointer;text-align:center;
  color:var(--label-2);font-size:14.5px;transition:border-color .2s var(--ease),background .2s var(--ease)}
.drop:hover,.drop.over{border-color:var(--primary);background:var(--gray6)}
.drop.has-file{border-style:solid;border-color:var(--primary);color:var(--label);font-weight:600}

/* ─ 세그먼트 컨트롤 (테마) ─ */
.seg{display:inline-flex;background:var(--gray6);border:1px solid var(--separator);border-radius:6px;padding:2px;gap:2px}
.seg button{border:none;background:transparent;color:var(--label);font-family:inherit;
  font-size:13px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;
  transition:background .2s var(--ease)}
.seg button[aria-pressed=true]{background:var(--bg-card);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-top">
      <h1>Storyboard Builder</h1>
      <div class="seg" role="group" aria-label="테마 선택">
        <button type="button" data-mode="auto" aria-pressed="true">자동</button>
        <button type="button" data-mode="light" aria-pressed="false">라이트</button>
        <button type="button" data-mode="dark" aria-pressed="false">다크</button>
      </div>
    </div>
    <div class="sub">요구사항을 입력하면 실무 수준 화면설계서(PPTX)를 만들어드립니다</div>
  </header>

  <div class="section-title">새 기획서</div>
  <section class="card" aria-label="기획서 생성 폼">
    <div class="row">
      <div><label for="title">문서 제목</label>
        <input type="text" id="title" placeholder="사전예약 페이지 상세기획서" /></div>
      <div><label for="category">카테고리 (게임/서비스명)</label>
        <input type="text" id="category" placeholder="스텔라 판타지" /></div>
    </div>
    <div class="row">
      <div><label for="platform">플랫폼</label><input type="text" id="platform" value="PC/MO" /></div>
      <div><label for="langs">지원 언어</label><input type="text" id="langs" value="ko" placeholder="ko, en, ja" /></div>
    </div>
    <label for="req">요구사항</label>
    <textarea id="req" placeholder="만들려는 페이지/기능을 자유롭게 적어주세요.&#10;미정인 항목은 문서에 노란 형광으로 표시됩니다."></textarea>
    <div class="switch-row">
      <div><div class="lbl">어드민(운영툴) 기획 포함</div>
        <div class="hint">목록·편집 화면 2장 세트가 추가됩니다</div></div>
      <label class="switch"><input type="checkbox" id="admin" /><span class="knob"></span></label>
    </div>
    <button class="btn block" id="go" type="button">기획서 생성</button>
    <div class="status" id="status" role="status"></div>
  </section>

  <div class="section-title">기존 기획서 업로드</div>
  <section class="card" aria-label="기존 기획서 업로드 폼">
    <div class="up-hint">기존 PPTX/PDF 기획서를 올리면 빌더 형식으로 변환됩니다. 변환 후 아래 목록에서 수정 요청·버전 관리가 가능합니다.</div>
    <label class="drop" id="drop">
      <input type="file" id="file" accept=".pptx,.pdf" hidden />
      <span id="drop-label">클릭해서 파일 선택 또는 여기로 드래그 (.pptx / .pdf)</span>
    </label>
    <div class="row" style="margin-top:14px">
      <div><label for="up-title">문서 제목</label>
        <input type="text" id="up-title" placeholder="파일 선택 시 자동 입력" /></div>
      <div><label for="up-category">카테고리 (게임/서비스명)</label>
        <input type="text" id="up-category" placeholder="에픽세븐" /></div>
    </div>
    <button class="btn block" id="up-go" type="button">업로드 &amp; 변환</button>
    <div class="status" id="up-status" role="status"></div>
  </section>

  <div class="section-title">생성된 기획서</div>
  <div class="list" id="list">
    <div class="empty"><span class="sf">📄</span>아직 생성된 기획서가 없습니다</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const api = p => fetch(p).then(r => r.json());
let pollTimer = null;

function setStatus(msg, kind, target){
  const el = $(target || '#status');
  el.style.display = 'flex';
  el.className = 'status' + (kind ? ' ' + kind : '');
  el.innerHTML = (kind ? '' : '<span class="spinner" aria-hidden="true"></span>') + '<span>' + msg + '</span>';
}

async function refresh(){
  const d = await api('/api/sb/projects');
  const list = $('#list');
  if(!d.items.length){
    list.innerHTML = '<div class="empty"><span class="sf">📄</span>아직 생성된 기획서가 없습니다</div>';
    return;
  }
  list.innerHTML = d.items.map(p => `
    <div class="proj" data-id="${p.id}">
      <div class="pt">
        <div><b>${p.title}</b><span class="chip">v${p.version}</span><span class="chip">${p.pages}장</span>
          <div class="meta">${p.category ? p.category + ' · ' : ''}최종 ${p.updated}</div></div>
      </div>
      <div class="actions">
        <a class="btn sm" href="/api/sb/projects/${p.id}/download" aria-label="${p.title} PPTX 다운로드">
          ⬇︎ PPTX</a>
        <button class="btn sm secondary" type="button" onclick="toggleHist('${p.id}')">이력 ${p.history.length}</button>
        <button class="btn sm secondary" type="button" onclick="toggleRev('${p.id}')">수정 요청</button>
      </div>
      <div class="hist" id="hist-${p.id}">
        ${p.history.map(h => `<div class="hist-row"><div class="hist-date">${h.date}</div>
          <div class="hist-items">${h.items.map(i=>'<div>· '+i+'</div>').join('')}</div>
          <div class="hist-drafter">${h.drafter}</div></div>`).join('')}
      </div>
      <div class="rev" id="rev-${p.id}">
        <input type="text" placeholder="예: 신청 완료 화면에 SNS 공유 버튼 추가" id="revin-${p.id}"
          aria-label="수정 요청 내용" />
        <button class="btn sm" type="button" onclick="revise('${p.id}')">반영</button>
      </div>
    </div>`).join('');
}

function toggleHist(id){ const el = $('#hist-'+id); el.style.display = el.style.display==='block' ? 'none' : 'block'; }
function toggleRev(id){ $('#rev-'+id).classList.toggle('open'); }

function poll(jobId, doneMsg, target){
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try{
      const j = await api('/api/sb/jobs/'+jobId);
      if(j.status === 'running'){ setStatus((j.step || '작업 중') + ' — 페이지를 닫아도 작업은 계속됩니다', '', target); }
      else if(j.status === 'done'){ clearInterval(pollTimer); setStatus(doneMsg, 'ok', target); refresh(); }
      else { clearInterval(pollTimer); setStatus('실패: ' + (j.error || '알 수 없음'), 'err', target); }
    }catch(e){ /* 유지 */ }
  }, 3000);
}

$('#go').addEventListener('click', async () => {
  const title = $('#title').value.trim();
  const req = $('#req').value.trim();
  if(title.length < 2 || req.length < 10){ setStatus('제목과 요구사항(10자 이상)을 입력해주세요', 'err'); return; }
  $('#go').disabled = true;
  setStatus('생성 요청 접수 중');
  try{
    const r = await fetch('/api/sb/generate', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title, category: $('#category').value.trim(), platform: $('#platform').value.trim(),
        langs: $('#langs').value.trim(), admin: $('#admin').checked, requirements: req})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || '요청 실패');
    poll(d.job_id, '기획서가 생성되었습니다 — 아래 목록에서 다운로드하세요');
  }catch(e){ setStatus(e.message, 'err'); }
  finally{ $('#go').disabled = false; }
});

async function revise(id){
  const input = $('#revin-'+id);
  const val = input.value.trim();
  if(val.length < 5){ setStatus('수정 내용을 입력해주세요', 'err'); return; }
  setStatus('수정 요청 접수 중');
  try{
    const r = await fetch(`/api/sb/projects/${id}/revise`, {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({instruction: val})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || '요청 실패');
    input.value = '';
    poll(d.job_id, '수정본이 생성되었습니다 (버전업 + History 기록 완료)');
  }catch(e){ setStatus(e.message, 'err'); }
}


// ─ 기존 기획서 업로드 ─
const drop = $('#drop'), fileIn = $('#file');
function setFile(f){
  if(!f) return;
  if(!/\.(pptx|pdf)$/i.test(f.name)){ setStatus('PPTX 또는 PDF 파일만 가능합니다', 'err', '#up-status'); return; }
  const dt = new DataTransfer(); dt.items.add(f); fileIn.files = dt.files;
  drop.classList.add('has-file');
  $('#drop-label').textContent = '📎 ' + f.name;
  if(!$('#up-title').value.trim()) $('#up-title').value = f.name.replace(/\.(pptx|pdf)$/i, '');
}
fileIn.addEventListener('change', () => setFile(fileIn.files[0]));
['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => setFile(e.dataTransfer.files[0]));

$('#up-go').addEventListener('click', async () => {
  const f = fileIn.files[0];
  const title = $('#up-title').value.trim();
  if(!f){ setStatus('파일을 선택해주세요', 'err', '#up-status'); return; }
  if(title.length < 2){ setStatus('문서 제목을 입력해주세요', 'err', '#up-status'); return; }
  $('#up-go').disabled = true;
  setStatus('업로드 중', '', '#up-status');
  try{
    const fd = new FormData();
    fd.append('file', f); fd.append('title', title); fd.append('category', $('#up-category').value.trim());
    const r = await fetch('/api/sb/upload', {method:'POST', body: fd});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || '업로드 실패');
    poll(d.job_id, '변환 완료 — 아래 목록에서 확인·수정 요청하세요', '#up-status');
  }catch(e){ setStatus(e.message, 'err', '#up-status'); }
  finally{ $('#up-go').disabled = false; }
});

// ─ 테마 토글 ─
const savedTheme = localStorage.getItem('sb-theme') || 'auto';
function applyTheme(mode){
  if(mode === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', mode);
  localStorage.setItem('sb-theme', mode);
  document.querySelectorAll('.seg button').forEach(b =>
    b.setAttribute('aria-pressed', String(b.dataset.mode === mode)));
}
document.querySelectorAll('.seg button').forEach(b =>
  b.addEventListener('click', () => applyTheme(b.dataset.mode)));
applyTheme(savedTheme);

refresh();
setInterval(refresh, 20000);
</script>
</body>
</html>
